<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    /* Navigation bar */
    .navbar {
      display: flex;
      background-color: #333;
    }

    .navbar button {
      flex: 1;
      padding: 14px;
      border: none;
      background: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .navbar button:hover {
      background-color: #575757;
    }

    .active {
      background-color: #007BFF;
    }

    /* Content sections */
    .tab-content {
      display: none;
      padding: 20px;
      background: white;
      margin: 20px;
      border-radius: 10px;
    }

    /* Overview image */
    .profile-img {
      max-width: 400px;
      height: auto;
      display: block;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <div class="navbar">
    <button class="tab-btn active" onclick="openTab(event, 'overview')">Overview</button>
    <button class="tab-btn" onclick="openTab(event, 'academic')">Academic</button>
    <button class="tab-btn" onclick="openTab(event, 'blog')">Blog</button>
  </div>

  <!-- Overview -->
  <div id="overview" class="tab-content" style="display:block;">
    <h2>Overview</h2>

    <!-- Image placeholder -->
    <img src="images/IMG_0682-1.jpg" alt="Profile Picture" class="profile-img">

    <!-- Description -->
    <p>
      Write a short introduction about yourself here.  
      You can include your background, interests, or what this website is about.
    </p>
  </div>

  <!-- Academic -->
  <div id="academic" class="tab-content">
    <h2>Academic</h2>
    <p>
      Add your academic work here:  
      - Subjects  
      - Research  
      - Notes  
      - Projects  
    </p>
  </div>

  <!-- Blog -->
  <div id="blog" class="tab-content">
    <h2>Blog</h2>
    <p>
      This is your blog section.  
      You can write posts, updates, or share ideas here.
    </p>
  </div>

  <!-- JavaScript -->
  <script>
    function openTab(evt, tabName) {
      let i, tabcontent, tabbuttons;

      tabcontent = document.getElementsByClassName("tab-content");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }

      tabbuttons = document.getElementsByClassName("tab-btn");
      for (i = 0; i < tabbuttons.length; i++) {
        tabbuttons[i].classList.remove("active");
      }

      document.getElementById(tabName).style.display = "block";
      evt.currentTarget.classList.add("active");
    }
  </script>

</body>
</html>
